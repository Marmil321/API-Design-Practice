parameters:
  - $ref: "../components/parameters/taskId.yml"

get:
  summary: Get a task by ID
  tags:
    - Tasks
  responses:
    "200":
      description: A task object
      content:
        application/json:
          schema:
            $ref: "../components/schemas/tasks/Task.yml"
    "400":
      $ref: "../components/responses/BadRequest.yml"
    "404":
      $ref: "../components/responses/NotFound.yml"
    "500":
      $ref: "../components/responses/InternalServerError.yml"
put:
  summary: Update a task by ID
  tags:
    - Tasks
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/tasks/UpdateTask.yml"
  responses:
    "200":
      description: Updated task object
      content:
        application/json:
          schema:
            $ref: "../components/schemas/tasks/Task.yml"
    "400":
      $ref: "../components/responses/BadRequest.yml"
    "401":
      $ref: "../components/responses/Unauthorized.yml"
    "404":
      $ref: "../components/responses/NotFound.yml"
    "500":
      $ref: "../components/responses/InternalServerError.yml"
delete:
  summary: Delete a task by ID
  tags:
    - Tasks
  responses:
    "204":
      description: Task deleted successfully
    "404":
      $ref: "../components/responses/NotFound.yml"
    "500":
      $ref: "../components/responses/InternalServerError.yml"
