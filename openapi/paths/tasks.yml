get:
  summary: Get all tasks
  tags:
    - Tasks
  parameters:
    - $ref: '../components/parameters/pagination/page.yml'
    - $ref: '../components/parameters/pagination/pageLimit.yml'
  responses:
    '200':
      description: A list of tasks
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '../components/schemas/tasks/Task.yml'
              pagination:
                type: object
                properties:
                  page:
                    type: integer
                  pageLimit:
                    type: integer
                  totalPages:
                    type: integer
                  totalItems:
                    type: integer
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yml'
post:
  summary: Create a new task
  tags:
    - Tasks
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/tasks/CreateTask.yml'
  responses:
    '201':
      description: Created task
      content:
        application/json:
          schema:
            $ref: '../components/schemas/tasks/Task.yml'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yml'
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yml'