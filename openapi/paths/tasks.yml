get:
  summary: Get all tasks
  tags:
    - Tasks
  parameters:
    - $ref: "../components/parameters/pagination/page.yml"
    - $ref: "../components/parameters/pagination/pageLimit.yml"
  responses:
    "200":
      description: A list of tasks
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../components/schemas/tasks/Task.yml"
              pagination:
                $ref: "../components/parameters/pagination/PaginationMeta.yml"
    "400":
      $ref: "../components/responses/BadRequest.yml"
    "401":
      $ref: "../components/responses/Unauthorized.yml"
    "403":
      $ref: "../components/responses/Forbidden.yml"
    "500":
      $ref: "../components/responses/InternalServerError.yml"
post:
  summary: Create a new task
  tags:
    - Tasks
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/tasks/CreateTask.yml"
  responses:
    "201":
      description: Created task
      content:
        application/json:
          schema:
            $ref: "../components/schemas/tasks/Task.yml"
    "400":
      $ref: "../components/responses/BadRequest.yml"
    "401":
      $ref: "../components/responses/Unauthorized.yml"
    "500":
      $ref: "../components/responses/InternalServerError.yml"