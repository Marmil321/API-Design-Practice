openapi: 3.0.3
info:
  title: Task API
  version: 0.0.1

paths:
  /tasks:
    $ref: './paths/tasks.yml'

  /tasks/{id}:
    $ref: './paths/taskById.yml'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      $ref: './components/schemas/ErrorResponse.yml'
    Task:
      $ref: './components/schemas/tasks/Task.yml'
    CreateTask:
      $ref: './components/schemas/tasks/CreateTask.yml'
    UpdateTask:
      $ref: './components/schemas/tasks/UpdateTask.yml'

security:
  - bearerAuth: []

servers:
  - url: http://localhost:3000
    description: Local development server